services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: crmuser
      POSTGRES_PASSWORD: crmpassword
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
      - ./seed/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmuser -d crmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: crm-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crmuser
      DB_PASSWORD: crmpassword
      DB_NAME: crmdb
      APP_PORT: 8082
      APPINSIGHTS_INSTRUMENTATIONKEY: "${APPINSIGHTS_INSTRUMENTATIONKEY:-}"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  crm_pgdata:
